<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Cast</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://db.onlinewebfonts.com/c/abe9e9e44fb3d470e5ecd486b158ce78?family=Distillery+Display+W00+Regular"
      rel="stylesheet"
    />
    <link
      href="https://db.onlinewebfonts.com/c/384a6031928e262848e4e7ef80037466?family=Kudryashev+Display+Sans"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/x-icon" href="media/favicon.png" />
  </head>
  <body>
    <div class="top">
      <div class="searchContainer">
        <div class="searchBarContainer">
          <div class="searchBar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              id="locationInput"
              type="text"
              placeholder="Search location"
            />
          </div>
        </div>
        <button class="searchSubmitBtn" type="submit">
          <i class="fa-solid fa-location-dot"></i>
        </button>
      </div>

      <div class="main">
        <div class="temp">
          <h2 class="tempText">31°C</h2>
        </div>
        <div class="condition">Sunny</div>
        <div class="location">
          <i class="fa-solid fa-location-dot cityLocationDot"></i>
          <div class="cityLocation">Noida</div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <div class="widgetArea">
        <div class="topWidgets">
          <div class="left">
            <div class="wind widget">
              <div class="arrow"><i class="fa-solid fa-arrow-up-long"></i></div>
              <div class="windText">
                <h2>Wind <br />Direction</h2>
                <div class="line"></div>
                <div class="windInfo">
                  <div class="windDirection">NW <br /></div>
                  <div class="windDegree">42</div>
                </div>
              </div>
            </div>
          </div>
          <div class="right">
            <div class="rightTop">
              <div class="time widget">
                <h2 id="localTime">9:41 AM</h2>
              </div>
            </div>
            <div class="rightBottom">
              <div class="humidityContainer widget">
                <h1 class="humidity">68%</h1>
                <div
                  class="line"
                  style="width: 75%; height: 1dvw; margin: 0 auto 0 auto"
                ></div>
                <div class="humidityText">
                  <h2>Humidity</h2>
                  <div class="humidityState">Moderate</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="sunStateCard widget">
          <div class="sunrise">
            <div class="sunCardUp">
              <div class="sunriseIcon circle"></div>
              <div class="sunTime"><h2 id="rise">5:27 AM</h2></div>
            </div>
            <div class="sunCardDown">Sunrise</div>
          </div>
          <div class="line"></div>
          <div class="sunset">
            <div class="sunCardUp">
              <div class="sunsetIcon circle"></div>
              <div class="sunTime"><h2 id="set">7:12 PM</h2></div>
            </div>
            <div class="sunCardDown">Sunset</div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
