<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Cast</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://db.onlinewebfonts.com/c/abe9e9e44fb3d470e5ecd486b158ce78?family=Distillery+Display+W00+Regular"
      rel="stylesheet"
    />
    <link
      href="https://db.onlinewebfonts.com/c/384a6031928e262848e4e7ef80037466?family=Kudryashev+Display+Sans"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="searchContainer">
      <div class="searchBarContainer">
        <div class="searchBar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <p>Search location</p>
        </div>
      </div>
      <div class="searchSubmitBtn">
        <i class="fa-solid fa-location-dot"></i>
      </div>
    </div>

    <div class="main">
      <div class="temp">
        <h2 class="tempText">31°C</h2>
      </div>
      <div class="condition">Sunny</div>
      <div class="location">
        <i class="fa-solid fa-location-dot cityLocationDot"></i> Noida
      </div>
    </div>

    <div class="widgetArea">
      <div class="topWidgets">
        <div class="right">
          <div class="wind">
            <div class="arrow"></div>
            <div class="windText">
              <div><h2>Wind Direction</h2></div>
              <div class="line"></div>
              <div class="windInfo">
                <div class="windDirection">NW</div>
                <div class="windDegree">42°</div>
              </div>
            </div>
          </div>
          <div class="left">
            <div class="leftTop">
              <div class="time"><h2>9:41 AM</h2></div>
            </div>
            <div class="leftBottom">
              <div class="aqiContainer">
                <div class="aqi"><h1>68</h1></div>
                <div><h2>AQI</h2></div>
                <div class="line"></div>
                <div class="aqiState">Moderate</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="sunStateCard">
        <div class="sunrise"></div>
        <div class="line"></div>
        <div class="sunset"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
